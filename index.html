.const-ring{position:absolute;top:50%;left:50%;border:1px dashed rgba(0,180,255,0.22);border-radius:50%;transform:translate(-50%,-50%);}

function applyLang(lang){
  const c = content[lang];
  document.getElementById('html-root').setAttribute('lang', c.htmlLang);
  document.getElementById('html-root').setAttribute('dir', c.dir);
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (c[key] !== undefined) el.textContent = c[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (c[key] !== undefined) el.innerHTML = c[key];
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  localStorage.setItem('donia_landing_lang', lang);
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

applyLang(localStorage.getItem('donia_landing_lang') || 'ar');

// Scroll reveal
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
